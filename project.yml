name: FengShuiLuopan
options:
  bundleIdPrefix: com.he
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: 0.15.3

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_PREVIEWS: YES

targets:
  FengShuiLuopan:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: FengShuiLuopan
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.he.FengShuiLuopan
        PRODUCT_NAME: FengShuiLuopan
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "需要获取您的位置信息以提供风水罗盘功能"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ASGH9MXV9V
        PROVISIONING_PROFILE_SPECIFIER: FengShuiLuopan_Dev
    dependencies:
      - package: SQLite
        product: SQLite

schemes:
  FengShuiLuopan:
    build:
      targets:
        FengShuiLuopan: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
