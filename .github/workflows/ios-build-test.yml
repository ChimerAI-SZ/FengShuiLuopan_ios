name: iOS Build Test (No Signing)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: Test Build Without Signing
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Show Xcode version
      run: xcodebuild -version

    # ========================================
    # 安装 XcodeGen
    # ========================================

    - name: Install XcodeGen
      run: |
        echo "📦 安装 XcodeGen..."
        brew install xcodegen
        xcodegen --version

    # ========================================
    # 生成 Xcode 项目
    # ========================================

    - name: Generate Xcode Project with XcodeGen
      run: |
        echo "🔧 使用 XcodeGen 生成 Xcode 项目..."
        xcodegen generate

        echo "✅ 项目生成成功"
        ls -la *.xcodeproj

    # ========================================
    # 安装 CocoaPods
    # ========================================

    - name: Install CocoaPods
      run: |
        echo "📦 安装 CocoaPods..."
        sudo gem install cocoapods
        pod --version

    - name: Install CocoaPods dependencies
      run: |
        echo "📦 安装 CocoaPods 依赖..."
        pod install --repo-update

        echo "✅ 依赖安装完成"
        ls -la *.xcworkspace

    # ========================================
    # 测试构建（不签名）
    # ========================================

    - name: Build Without Signing
      run: |
        echo "🔨 测试构建（不签名）..."

        # 使用真机架构构建（不需要模拟器）
        # 这样可以验证代码编译，但不需要实际运行
        set +e  # 不立即退出，捕获错误
        xcodebuild clean build \
          -workspace FengShuiLuopan.xcworkspace \
          -scheme FengShuiLuopan \
          -configuration Debug \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO 2>&1 | tee build.log

        BUILD_EXIT_CODE=${PIPESTATUS[0]}

        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo ""
          echo "❌ 构建失败 (exit code: $BUILD_EXIT_CODE)"
          echo ""
          echo "=== 错误摘要 (最后 100 行) ==="
          tail -100 build.log | grep -E "error:|warning:|fatal|undefined" || tail -100 build.log
          echo ""
          echo "=== 完整日志已保存到 build.log ==="
          exit $BUILD_EXIT_CODE
        fi

        echo "✅ 构建成功 - 代码可以编译通过"

    - name: Build Summary
      if: always()
      run: |
        echo "========================================="
        echo "构建测试完成"
        echo "========================================="
        echo "目的: 验证代码能否编译通过（不涉及签名）"
        echo "结果: 查看上方 Build Without Signing 步骤"
        echo "========================================="
