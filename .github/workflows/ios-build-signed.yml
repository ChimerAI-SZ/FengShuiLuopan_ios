name: iOS Build with Signing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Sign iOS App
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Show Xcode version
      run: xcodebuild -version

    # ========================================
    # 安装 XcodeGen
    # ========================================

    - name: Install XcodeGen
      run: |
        echo "📦 安装 XcodeGen..."
        brew install xcodegen
        xcodegen --version

    # ========================================
    # 证书和配置文件设置
    # ========================================

    - name: Install Apple Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # 创建临时目录
        CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # 解码证书
        echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

        # 创建临时keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # 导入证书
        security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # 设置证书信任
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        echo "✅ Certificate imported successfully"

    - name: Install Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      run: |
        # 验证 Secret 是否存在
        if [ -z "$PROVISIONING_PROFILE_BASE64" ]; then
          echo "❌ Error: IOS_PROVISIONING_PROFILE_BASE64 secret is empty or not set"
          echo "Please check GitHub repository secrets"
          exit 1
        fi

        echo "✅ Provisioning profile secret found (length: ${#PROVISIONING_PROFILE_BASE64})"

        # 创建配置文件目录
        PP_PATH=~/Library/MobileDevice/Provisioning\ Profiles
        mkdir -p "$PP_PATH"

        # 解码并保存配置文件
        PROVISION_PATH=$RUNNER_TEMP/profile.mobileprovision
        echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PROVISION_PATH

        # 验证文件是否成功解码
        if [ ! -f "$PROVISION_PATH" ] || [ ! -s "$PROVISION_PATH" ]; then
          echo "❌ Error: Failed to decode provisioning profile"
          exit 1
        fi

        # 使用 security 命令提取 UUID（更可靠）
        PP_UUID=$(security cms -D -i "$PROVISION_PATH" 2>/dev/null | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')

        # 如果 security 命令失败，尝试使用 grep
        if [ -z "$PP_UUID" ]; then
          echo "⚠️  Trying alternative UUID extraction method..."
          PP_UUID=$(grep -aA1 '<key>UUID</key>' "$PROVISION_PATH" | grep '<string>' | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
        fi

        if [ -z "$PP_UUID" ]; then
          echo "❌ Error: Failed to extract UUID from provisioning profile"
          exit 1
        fi

        # 复制到正确位置
        cp "$PROVISION_PATH" "$PP_PATH/$PP_UUID.mobileprovision"

        echo "✅ Provisioning profile installed: $PP_UUID"

    # ========================================
    # 安装依赖
    # ========================================

    - name: Install CocoaPods
      run: |
        echo "📦 安装 CocoaPods..."
        sudo gem install cocoapods
        pod --version

    - name: Generate Xcode Project with XcodeGen
      run: |
        echo "🔨 使用 XcodeGen 生成 Xcode 项目..."
        xcodegen generate

        echo "✅ Xcode 项目生成完成"
        ls -la *.xcodeproj

    - name: Install CocoaPods dependencies
      run: |
        echo "📦 安装 CocoaPods 依赖..."
        pod install --repo-update

        echo "✅ CocoaPods 依赖安装完成"
        ls -la

    # ========================================
    # 构建和签名
    # ========================================

    - name: Build iOS App
      run: |
        echo "🔨 开始构建 iOS 应用..."

        xcodebuild clean archive \
          -workspace FengShuiLuopan.xcworkspace \
          -scheme FengShuiLuopan \
          -configuration Release \
          -archivePath $RUNNER_TEMP/FengShuiLuopan.xcarchive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Development" \
          DEVELOPMENT_TEAM="66JTX3GW7T" \
          PROVISIONING_PROFILE_SPECIFIER="FengShuiLuopan_Dev"

        # 验证 archive 是否创建成功
        if [ -d "$RUNNER_TEMP/FengShuiLuopan.xcarchive" ]; then
          echo "✅ Archive 创建成功"
          ls -la "$RUNNER_TEMP/FengShuiLuopan.xcarchive"
        else
          echo "❌ Archive 创建失败"
          ls -la "$RUNNER_TEMP/" || true
          exit 1
        fi

        echo "✅ 构建完成"

    - name: Export IPA
      id: export_ipa
      run: |
        echo "📦 开始导出 IPA..."

        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/FengShuiLuopan.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath $RUNNER_TEMP/export

        # 检查 IPA 是否生成
        if [ -f "$RUNNER_TEMP/export/FengShuiLuopan.ipa" ]; then
          echo "✅ IPA 导出成功"
          echo "ipa_path=$RUNNER_TEMP/export/FengShuiLuopan.ipa" >> $GITHUB_OUTPUT
          ls -lh "$RUNNER_TEMP/export/"
        else
          echo "❌ IPA 文件未找到"
          ls -lh "$RUNNER_TEMP/export/" || echo "export 目录不存在"
          exit 1
        fi

    # ========================================
    # 上传产物
    # ========================================

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      if: steps.export_ipa.outcome == 'success'
      with:
        name: FengShuiLuopan-IPA
        path: ${{ runner.temp }}/export/*.ipa
        retention-days: 30

    - name: Upload dSYM
      uses: actions/upload-artifact@v4
      if: steps.export_ipa.outcome == 'success'
      with:
        name: FengShuiLuopan-dSYM
        path: ${{ runner.temp }}/export/*.dSYM
        retention-days: 30

    # ========================================
    # 清理
    # ========================================

    - name: Cleanup
      if: always()
      run: |
        echo "🧹 清理临时文件..."
        rm -f $RUNNER_TEMP/certificate.p12
        rm -f $RUNNER_TEMP/profile.mobileprovision
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
        echo "✅ 清理完成"

    - name: Build summary
      if: always()
      run: |
        echo "📊 构建总结"
        echo "============================================"
        if [ -f "$RUNNER_TEMP/export/FengShuiLuopan.ipa" ]; then
          echo "✅ IPA 文件已生成"
          ls -lh "$RUNNER_TEMP/export/FengShuiLuopan.ipa"
        else
          echo "❌ IPA 文件未生成"
        fi
        echo "============================================"
