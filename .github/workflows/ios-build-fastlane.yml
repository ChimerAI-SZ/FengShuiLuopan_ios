name: iOS Build with Fastlane

on:
  workflow_dispatch:

jobs:
  build:
    name: Build with Fastlane
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Show Xcode version
      run: xcodebuild -version

    # ========================================
    # 安装工具
    # ========================================

    - name: Install Tools
      run: |
        echo "📦 安装工具..."

        # 安装 XcodeGen
        brew install xcodegen
        xcodegen --version

        # 安装 CocoaPods
        sudo gem install cocoapods
        pod --version

        # 安装 Fastlane
        sudo gem install fastlane
        fastlane --version

        echo "✅ 工具安装完成"

    # ========================================
    # 证书和配置文件设置
    # ========================================

    - name: Install Apple Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # 解码证书
        echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

        # 创建临时keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # 导入证书
        security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        echo "✅ 证书导入完成"

    - name: Install Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
      run: |
        # 验证 Secret 是否存在
        if [ -z "$PROVISIONING_PROFILE_BASE64" ]; then
          echo "❌ Error: IOS_PROVISION_PROFILE_BASE64 secret is empty or not set"
          echo "Please check GitHub repository secrets"
          exit 1
        fi

        echo "✅ Provisioning profile secret found (length: ${#PROVISIONING_PROFILE_BASE64})"

        PP_PATH=$RUNNER_TEMP/profile.mobileprovision

        # 解码 Provisioning Profile
        echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

        # 验证解码后的文件
        if [ ! -f "$PP_PATH" ] || [ ! -s "$PP_PATH" ]; then
          echo "❌ Error: Failed to decode provisioning profile"
          exit 1
        fi

        # 提取 UUID
        PP_UUID=$(security cms -D -i $PP_PATH 2>/dev/null | grep -A 1 "<key>UUID</key>" | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/')

        if [ -z "$PP_UUID" ]; then
          echo "❌ Error: Failed to extract UUID from provisioning profile"
          exit 1
        fi

        echo "Provisioning Profile UUID: $PP_UUID"

        # 安装到标准位置（使用 UUID 作为文件名）
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

        echo "✅ Provisioning Profile 安装完成"

    # ========================================
    # 生成项目
    # ========================================

    - name: Generate Xcode Project
      run: |
        echo "🔧 生成 Xcode 项目..."
        xcodegen generate
        ls -la *.xcodeproj

    - name: Install Dependencies
      run: |
        echo "📦 安装依赖..."
        pod install --repo-update
        ls -la *.xcworkspace

    # ========================================
    # 使用 Fastlane 构建
    # ========================================

    - name: Verify Signing Setup
      run: |
        echo "🔍 验证签名配置..."
        echo ""
        echo "=== 已安装的证书 ==="
        security find-identity -v -p codesigning
        echo ""
        echo "=== 已安装的 Provisioning Profiles ==="
        ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
        echo ""
        echo "=== Provisioning Profile 详情 ==="
        for profile in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
          echo "Profile: $profile"
          security cms -D -i "$profile" | grep -A 5 "Name\|UUID\|TeamIdentifier\|ApplicationIdentifierPrefix" || true
          echo "---"
        done

    - name: Build with Fastlane
      run: |
        echo "🚀 使用 Fastlane 构建..."
        fastlane build 2>&1 | tee fastlane.log
      continue-on-error: true

    - name: Upload Fastlane Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: fastlane-log
        path: fastlane.log
        retention-days: 7

    # ========================================
    # 上传产物
    # ========================================

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: FengShuiLuopan-IPA
        path: build/FengShuiLuopan.ipa
        retention-days: 30

    - name: Upload dSYM
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: FengShuiLuopan-dSYM
        path: build/FengShuiLuopan.app.dSYM.zip
        retention-days: 30

    - name: Build Summary
      if: always()
      run: |
        echo "========================================="
        echo "Fastlane 构建完成"
        echo "========================================="
        if [ -f "build/FengShuiLuopan.ipa" ]; then
          echo "✅ IPA 构建成功"
          ls -lh build/FengShuiLuopan.ipa
        else
          echo "❌ IPA 构建失败"
        fi
        echo "========================================="
